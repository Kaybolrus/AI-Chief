name: Build APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FLET_NO_PROMPT: 1
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ ВАЖНО: правильная версия Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"

      - name: Flutter doctor
        run: flutter doctor

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet google-generativeai flet-cli

      - name: Build APK
        run: |
          flet build apk --no-rich-output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/apk/*.apk
