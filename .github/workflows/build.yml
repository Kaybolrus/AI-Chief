name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Python distributive
        uses: actions/cache@v4
        with:
          path: /tmp/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz
          key: cpython-3.11.6-20231002

      - name: Pre-download Python distributive
        run: |
          FILE=/tmp/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz
          if [ ! -f "$FILE" ]; then
            wget -q --show-progress \
              https://github.com/indygreg/python-build-standalone/releases/download/20231002/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz \
              -O "$FILE"
          else
            echo "Cached: $(du -sh $FILE)"
          fi

      - name: Precache Flutter Android
        run: flutter precache --android

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet==0.24.1

      - name: Inject Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i "s|YOUR_API_KEY_HERE|${GEMINI_API_KEY}|g" config.py
          echo "Injected: ${#GEMINI_API_KEY} chars"

      - name: Remove old Gradle init scripts
        run: rm -f $HOME/.gradle/init.d/*.gradle || true

      - name: Patch wakelock_plus and build APK
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # Скачиваем wakelock в pub-cache если ещё нет
          flutter pub cache repair || true

          # Патчим через Python
          python3 << 'PYEOF'
          import os, re, glob

          pattern = os.path.expanduser(
              "~/.pub-cache/hosted/pub.dev/wakelock_plus-*/android/build.gradle"
          )
          files = glob.glob(pattern)

          for path in files:
              with open(path) as f:
                  content = f.read()

              content = re.sub(
                  r'compileSdkVersion\s+flutter\.compileSdkVersion',
                  'compileSdkVersion 35', content
              )
              content = re.sub(
                  r'targetSdkVersion\s+flutter\.targetSdkVersion',
                  'targetSdkVersion 35', content
              )
              content = re.sub(
                  r'minSdkVersion\s+flutter\.minSdkVersion',
                  'minSdkVersion 21', content
              )
              if 'namespace' not in content:
                  content = content.replace(
                      'android {',
                      'android {\n    namespace "dev.fluttercommunity.plus.wakelock"',
                      1
                  )

              with open(path, 'w') as f:
                  f.write(content)
              print(f"Patched: {path}")

          if not files:
              print("wakelock_plus not in pub-cache yet, will patch after flutter pub get")
          PYEOF

          # Сборка APK
          flet build apk \
            --project "AI Chef Pro" \
            --org com.aichef \
            --build-version ${{ github.run_number }} \
            --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-chef-pro-build-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
