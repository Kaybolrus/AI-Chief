name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet --upgrade
          echo "Flet version: $(flet --version)"

      - name: Inject Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i "s|YOUR_API_KEY_HERE|${GEMINI_API_KEY}|g" config.py || true
          echo "Injected: ${#GEMINI_API_KEY} chars"

      - name: Remove Gradle init scripts
        run: rm -f $HOME/.gradle/init.d/*.gradle || true

      - name: Build APK
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # Гарантируем правильный requirements.txt
          printf "flet\ncertifi\n" > requirements.txt
          cat requirements.txt

          rm -rf build
          flet build apk \
            --project "AI Chef Pro" \
            --org com.aichef \
            --build-version ${{ github.run_number }} \
            --verbose
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-chef-pro-build-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
