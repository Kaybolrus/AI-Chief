name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11.6
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.6"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Python distributive archive
        uses: actions/cache@v4
        with:
          path: /tmp/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz
          key: cpython-3.11.6-20231002

      - name: Pre-download Python distributive
        run: |
          FILE=/tmp/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz
          if [ ! -f "$FILE" ]; then
            echo "Downloading..."
            wget -q --show-progress \
              https://github.com/indygreg/python-build-standalone/releases/download/20231002/cpython-3.11.6+20231002-x86_64-unknown-linux-gnu-install_only.tar.gz \
              -O "$FILE"
          else
            echo "Already cached: $(du -sh $FILE)"
          fi

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet==0.24.1 google-generativeai

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Download Flutter packages
        run: |
          flutter precache --android
          cd /tmp && flutter create temp_project --platforms android
          cd temp_project && flutter pub add wakelock_plus:1.4.0 || true
          cd /tmp && rm -rf temp_project

      - name: Patch wakelock_plus
        run: |
          WAKELOCK="$HOME/.pub-cache/hosted/pub.dev/wakelock_plus-1.4.0/android/build.gradle"
          cat > "$WAKELOCK" << 'EOF'
          group 'dev.fluttercommunity.plus.wakelock'
          version '1.0'

          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
              }
          }

          rootProject.allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          apply plugin: 'com.android.library'

          android {
              namespace 'dev.fluttercommunity.plus.wakelock'
              compileSdkVersion 35
              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 35
              }
          }
          EOF
          echo "wakelock_plus patched"

      - name: Inject Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i "s|YOUR_API_KEY_HERE|${GEMINI_API_KEY}|g" config.py
          echo "Injected: ${#GEMINI_API_KEY} chars"

      - name: Build APK
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          flet build apk \
            --project "AI Chef Pro" \
            --org com.aichef \
            --build-version ${{ github.run_number }} \
            --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-chef-pro-build-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
