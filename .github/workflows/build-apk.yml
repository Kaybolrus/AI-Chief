name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Precache Flutter Android
        run: flutter precache --android

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet==0.25.2 google-generativeai

      - name: Inject Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Прямая замена ключа в конфиге
          sed -i "s|YOUR_API_KEY_HERE|${GEMINI_API_KEY}|g" config.py || true
          echo "API key injected: ${#GEMINI_API_KEY} chars"

      - name: Create Gradle Fix Script
        run: |
          # Этот скрипт принудительно лечит ошибки плагинов wakelock и lifecycle
          mkdir -p $HOME/.gradle/init.d
          cat <<EOF > $HOME/.gradle/init.d/fix_sdk_version.gradle
          allprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 35
                          if (project.name == 'wakelock_plus') {
                              namespace = 'dev.fluttercommunity.plus.wakelock'
                          }
                          defaultConfig {
                              targetSdkVersion 35
                          }
                      }
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          # Добавляем флаг --compile-sdk 35, чтобы проект соответствовал требованиям новых плагинов
          flet build apk \
            --project "AI Chef Pro" \
            --org com.aichef \
            --build-version ${{ github.run_number }} \
            --compile-sdk 35 \
            --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-chef-pro-build-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
