name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Precache Flutter Android
        run: flutter precache --android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v1-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-v1-${{ runner.os }}-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-v1-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-v1-${{ runner.os }}-

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet==0.21.2 google-generativeai

      - name: Inject Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i \
            "s|GEMINI_API_KEY = os.getenv(\"GEMINI_API_KEY\", \"YOUR_API_KEY_HERE\")|GEMINI_API_KEY = \"${GEMINI_API_KEY}\"|" \
            config.py
          echo "API key injected: ${#GEMINI_API_KEY} chars"

      - name: Build APK
        run: |
          flet build apk \
            --project "AI Chef Pro" \
            --org com.aichef \
            --build-version ${{ github.run_number }} \
            --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-chef-pro-build-${{ github.run_number }}
          path: build/apk/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
